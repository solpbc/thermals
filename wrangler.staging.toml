# SPDX-License-Identifier: AGPL-3.0-only
# Staging config: same worker, NO custom-domain routes — deploys to a
# *.workers.dev URL so the backend can be validated live before the
# thermals.cloud origin swap (the VPE↔CTO seam) lands. Production uses
# wrangler.toml (with the thermals.cloud routes).
name = "thermals-appview-staging"
main = "src/index.js"
compatibility_date = "2024-12-01"
account_id = "3f2c1528c7d4d9685819ea9e9e307c92"
workers_dev = true

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/oauth/*", "/client-metadata.json", "/jwks.json"]

[[d1_databases]]
binding = "DB"
database_name = "thermals-appview"
database_id = "19bd234d-5418-4cda-ac50-8a1af49999e7"

[durable_objects]
bindings = [
  { name = "CURSOR_STORE", class_name = "CursorStore" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CursorStore"]

[triggers]
crons = ["*/1 * * * *"]

[vars]
COMMONS_HOST = "rook.host"
JETSTREAM_URL = "wss://jetstream1.us-east.bsky.network/subscribe"
OAUTH_CLIENT_URI = "https://thermals-appview-staging.jer-3f2.workers.dev"
